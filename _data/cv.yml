- title: Experience
  type: time_table
  contents:

    - title: Bioinformatics Scientist
      institution: Watchmaker Genomics
      year: Jun 2025 – Present
      description:
        - Designed and developed algorithms for NGS secondary analysis, including variant and biomarker detection for oncology applications
        - Developing a somatic variant caller in Rust using trinucleotide-context error modeling and binomial hypothesis testing
        - Improved low allele frequency variant detection performance (~AF < 0.07) through statistical error modeling approaches
        - Optimized indel calling in germline TAPS Variant Caller (TVC), improving F1 from ~0.74 to ~0.875
        - Integrated modules into production-grade Nextflow pipelines with CI, cloud profiles, and versioned testing
        - Evaluated clinical relevance of variant calls using cBioPortal and functional annotation tools
        - Collaborated across wet lab, engineering, and business teams to define product scope and requirements

    - title: Graduate Researcher (PhD), Stajich Lab
      institution: University of California, Riverside
      year: 2022 – 2025
      description:
        - Developed computational workflows for large-scale genomic and metagenomic analysis using Python and R
        - Designed sequencing pipelines (Nanopore + Illumina) generating fungal genome assemblies and metagenomic datasets
        - Applied statistical and phylogenetic methods to study microbial diversity and environmental adaptation
        - First author and co-author publications in New Phytologist, ISME Journal, and bioRxiv
        - Built bioinformatics pipelines for genome assembly, annotation, and microbial community analysis

